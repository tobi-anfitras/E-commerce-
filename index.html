<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="">
</head>
<body>    
    <main class="login-container">
        <form id="form-login">
            <h2>Acessar teachStore</h2>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="coloque o seu email" required>
               
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="coloque sua senha" required>
            </div>

            <button type="submit" id="btn-entrar">Entrar</button>

            <p id="mensagen-error" class="hidden">E-mail ou senha invalidos</p>

            <div class="footer-login">
                <a href="">esqueceu a senha?</a>
                <span>nao tem conta?<a href="#">Cadastre-se</a></span>
            </div>

        </form>
      
    </main>

    <script src="index.js"></script>
</body>
</html>
